@if (authService.isAuthInitialized()) {
  @if (authService.isLoggedIn()) {
    <app-sidebar />
  }

  <div
    class="container"
    [class.with-sidebar]="authService.isLoggedIn()"
    [class.sidebar-collapsed]="sidebarService.collapsed()"
  >
    <div class="theme-bar">
      <app-theme-toggle />
    </div>
    <main>
      <router-outlet />
    </main>

    <app-footer />
  </div>

  <app-toast />
} @else {
  <div class="app-loading">
    <div class="app-loading-spinner"></div>
  </div>
}
