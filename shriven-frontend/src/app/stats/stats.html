<div class="stats-page">
  <div class="stats-header">
    <a routerLink="/" class="back-btn">
      <lucide-icon [img]="arrowLeftIcon" [size]="18" />
      Back
    </a>
    <div class="stats-title">
      <lucide-icon [img]="chartIcon" [size]="22" class="title-icon" />
      <h2>Stats for <span class="short-code">{{ shortCode() }}</span></h2>
    </div>
  </div>

  <div class="stats-summary">
    <div class="summary-card">
      <div class="summary-value">{{ totalClicks() }}</div>
      <div class="summary-label">Total Clicks</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-controls">
      <button
        class="period-btn"
        [class.active]="period() === 'daily'"
        (click)="setPeriod('daily')"
      >
        Last 7 Days
      </button>
      <button
        class="period-btn"
        [class.active]="period() === 'weekly'"
        (click)="setPeriod('weekly')"
      >
        Last 4 Weeks
      </button>
    </div>

    @if (isLoading()) {
      <div class="chart-loading">
        <lucide-icon [img]="loaderIcon" [size]="28" class="spinner" />
      </div>
    } @else if (error()) {
      <div class="chart-error">{{ error() }}</div>
    } @else if (isBrowser) {
      <div class="chart-wrapper">
        <canvas
          baseChart
          [data]="chartData()"
          [options]="chartOptions"
          type="bar"
        ></canvas>
      </div>
    }
  </div>
</div>
